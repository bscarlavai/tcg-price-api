# Daily ingest (DESIGN.md D6): TCGCSV refreshes ~20:00 UTC; we pull at 21:37
# (off the half-hour — GitHub's cron queue slips worst at :00/:30).
# Failure (including the coverage ratchet refusing to promote) fails the run → email.
name: ingest
on:
  schedule:
    - cron: "37 21 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "override coverage ratchet"
        type: boolean
        default: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22 }
      # tcgcsv.com/docs usage guidelines: check last-updated.txt and only sync on fresh
      # data. If their refresh is late, wait (up to ~2h); if it never lands, fail loudly
      # rather than re-ingest yesterday's prices stamped with today's date.
      # Manual dispatches skip the guard — re-runs after a fix are the operator's call.
      - name: Wait for today's TCGCSV refresh
        if: github.event_name == 'schedule'
        run: |
          today=$(date -u +%F)
          for i in $(seq 1 13); do
            stamp=$(curl -sf -A "lavailabs-tcg-price-api/1.0" https://tcgcsv.com/last-updated.txt || echo unreachable)
            if [[ "$stamp" == "$today"* ]]; then echo "fresh: $stamp"; exit 0; fi
            echo "not refreshed yet ($stamp); retry $i/13 in 10m"
            sleep 600
          done
          echo "TCGCSV never refreshed today — refusing to ingest stale prices" >&2
          exit 1
      - name: Ingest all games
        # Sequential on purpose: one polite stream of requests to tcgcsv, and a failure
        # in one game (audit ratchet) doesn't block the others — each is its own step-line.
        run: |
          failed=0
          for game in pokemon yugioh magic onepiece lorcana; do
            node ingest/run.js --game "$game" --push ${{ inputs.force && '--force' || '' }} || failed=1
          done
          node ingest/movers.js || failed=1
          exit $failed
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
