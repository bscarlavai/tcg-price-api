# Daily ingest (DESIGN.md D6): TCGCSV refreshes ~20:00 UTC; we pull at 21:30.
# Failure (including the coverage ratchet refusing to promote) fails the run → email.
name: ingest
on:
  schedule:
    - cron: "30 21 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "override coverage ratchet"
        type: boolean
        default: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Ingest all games
        # Sequential on purpose: one polite stream of requests to tcgcsv, and a failure
        # in one game (audit ratchet) doesn't block the others — each is its own step-line.
        run: |
          failed=0
          for game in pokemon yugioh magic onepiece lorcana; do
            node ingest/run.js --game "$game" --push ${{ inputs.force && '--force' || '' }} || failed=1
          done
          exit $failed
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
