# Read API worker. Ingest does NOT run here (see DESIGN.md D6) — it runs in GitHub
# Actions and writes to KV/D1 via the REST API.
#
# One-time setup (see SETUP.md): create the KV namespace + D1 database, then replace
# the placeholder ids below.

name = "tcg-price-api"
main = "worker/index.js"
compatibility_date = "2026-07-01"
# rip-prices.lavailabs.com is the ONLY URL that ever ships in an app binary
# (workers.dev never does). The worker also tolerates an /api path prefix, so the API
# could later be mounted under another host's /api without a client-visible change.
workers_dev = false

routes = [{ pattern = "rip-prices.lavailabs.com", custom_domain = true }]

# Per-IP rate limit (best-effort, per-colo). 200/min lets the bundle pipeline pull all
# ~172 sets in one burst while capping what any single IP can cost us.
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 200, period = 60 }

# Strict per-IP limit for the /v1/report WRITE endpoint — reports are occasional, so 6/min caps how
# many images one IP can push (separate from the 200/min read limit above).
[[ratelimits]]
name = "REPORT_LIMITER"
namespace_id = "1002"
simple = { limit = 6, period = 60 }

[[kv_namespaces]]
binding = "PRICES"
id = "ab23471a070b4fe9ac1fb38b1e0bda4d"

[[d1_databases]]
binding = "HISTORY"
database_name = "tcg-price-history"
database_id = "6a8750db-5159-45a0-92ec-dd8fe0509009"

# Scan-issue reports: when a card won't scan, the app POSTs the rendered diagnostic image (+ metadata)
# to /v1/report and it lands here — the real-world failure corpus that drives catalog/ORB fixes.
[[r2_buckets]]
binding = "REPORTS"
bucket_name = "riplist-scan-reports"
