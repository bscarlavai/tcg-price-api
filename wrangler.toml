# Read API worker. Ingest does NOT run here (see DESIGN.md D6) — it runs in GitHub
# Actions and writes to KV/D1 via the REST API.
#
# One-time setup (see SETUP.md): create the KV namespace + D1 database, then replace
# the placeholder ids below.

name = "tcg-price-api"
main = "worker/index.js"
compatibility_date = "2026-07-01"

# routes = [{ pattern = "prices.lavailabs.com", custom_domain = true }]  # enable at launch

[[kv_namespaces]]
binding = "PRICES"
id = "ab23471a070b4fe9ac1fb38b1e0bda4d"

[[d1_databases]]
binding = "HISTORY"
database_name = "tcg-price-history"
database_id = "6a8750db-5159-45a0-92ec-dd8fe0509009"
